# netlify.toml — положить в корень репозитория

[build]
  base    = "apps/web"                # папка с package.json и Next.js
  command = "npm install && npm run build"
  publish = ".next"                   # папка для статических файлов

[[plugins]]
  package = "@netlify/plugin-nextjs"  # плагин для сборки Next.js на Netlify

[functions]
  directory = "apps/functions"        # путь к Netlify Functions относительно корня репо

[build.environment]
  NODE_VERSION = "20"                 # версия Node.js для сборки

# Опционально: логирование или кеширование можно добавить позже
